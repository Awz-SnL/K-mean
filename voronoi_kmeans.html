<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voronoi & K-Means — Minh họa vùng ảnh hưởng centroid</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f0f13;
    color: #e8e6f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 16px 40px;
  }
  h1 {
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.3px;
    margin-bottom: 4px;
    color: #f0eeff;
  }
  .subtitle {
    font-size: 13px;
    color: #7c7a8e;
    margin-bottom: 20px;
  }
  #canvas-wrap {
    position: relative;
    width: 100%;
    max-width: 700px;
  }
  canvas {
    display: block;
    width: 100%;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    cursor: crosshair;
    background: #16151f;
  }
  .controls {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 14px 0 8px;
    flex-wrap: wrap;
    width: 100%;
    max-width: 700px;
  }
  .ctrl-group {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: #9a98a8;
  }
  .ctrl-group span.val {
    font-weight: 600;
    color: #c8c4f0;
    min-width: 20px;
  }
  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    background: rgba(255,255,255,0.12);
    border-radius: 2px;
    outline: none;
    width: 90px;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #7f77dd;
    cursor: pointer;
    border: 2px solid #0f0f13;
  }
  .btn-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-left: auto;
  }
  button {
    font-size: 13px;
    padding: 6px 16px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.14);
    background: rgba(255,255,255,0.05);
    color: #d4d2e8;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  button:hover { background: rgba(255,255,255,0.1); }
  button:active { transform: scale(0.97); }
  button.primary {
    background: rgba(127,119,221,0.2);
    border-color: rgba(127,119,221,0.5);
    color: #c8c4f0;
  }
  button.primary:hover { background: rgba(127,119,221,0.32); }
  .legend {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    margin-top: 6px;
    font-size: 12px;
    color: #7c7a8e;
    width: 100%;
    max-width: 700px;
  }
  .leg-item { display: flex; align-items: center; gap: 5px; }
  .leg-dot { width: 9px; height: 9px; border-radius: 50%; }
  .info {
    font-size: 12px;
    color: #55536a;
    margin-top: 10px;
    text-align: center;
    width: 100%;
    max-width: 700px;
  }
  .step-badge {
    font-size: 12px;
    color: #7f77dd;
    margin-left: 4px;
    font-weight: 500;
  }
</style>
</head>
<body>

<h1>Biểu đồ Voronoi & K-Means</h1>
<p class="subtitle">Minh họa vùng ảnh hưởng của từng centroid trong không gian 2D</p>

<div id="canvas-wrap">
  <canvas id="vc"></canvas>
</div>

<div class="controls">
  <div class="ctrl-group">
    <span>K =</span>
    <input type="range" min="2" max="8" value="5" id="kslider" step="1">
    <span class="val" id="kval">5</span>
  </div>
  <div class="ctrl-group">
    <span>Điểm =</span>
    <input type="range" min="20" max="300" value="100" id="nslider" step="1">
    <span class="val" id="nval">100</span>
  </div>
  <div class="btn-row">
    <button id="btnRegen">Tạo mới</button>
    <button class="primary" id="btnStep">Bước lặp K-Means <span class="step-badge" id="stepcount">#0</span></button>
    <button id="btnReset">Reset centroid</button>
  </div>
</div>

<div class="legend" id="legend"></div>
<div class="info">
  Nhấp vào canvas để thêm điểm &nbsp;·&nbsp; Kéo centroid (vòng tròn) để di chuyển &nbsp;·&nbsp; "Bước lặp" = cập nhật centroid về trung bình cluster
</div>

<script>
const canvas = document.getElementById('vc');
const ctx = canvas.getContext('2d');
const W = 700, H = 500;
canvas.width = W; canvas.height = H;

const PALETTE = [
  {fill:'#3C3489',light:'#AFA9EC',border:'#7f77dd'},
  {fill:'#0F6E56',light:'#5DCAA5',border:'#1D9E75'},
  {fill:'#993C1D',light:'#F0997B',border:'#D85A30'},
  {fill:'#185FA5',light:'#85B7EB',border:'#378ADD'},
  {fill:'#854F0B',light:'#EF9F27',border:'#BA7517'},
  {fill:'#993556',light:'#ED93B1',border:'#D4537E'},
  {fill:'#3B6D11',light:'#97C459',border:'#639922'},
  {fill:'#A32D2D',light:'#F09595',border:'#E24B4A'},
];

let K = 5, N = 100, stepCount = 0;
let centroids = [], points = [], dragging = -1;

function randInt(a,b){ return Math.floor(Math.random()*(b-a))+a; }
function dist2(a,b){ return (a.x-b.x)**2+(a.y-b.y)**2; }

function hexToRgb(h){
  const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return {r,g,b};
}

function initCentroids(){
  centroids=[];
  stepCount=0;
  document.getElementById('stepcount').textContent='#0';
  for(let i=0;i<K;i++) centroids.push({x:randInt(80,W-80),y:randInt(80,H-80)});
}
function initPoints(){
  points=[];
  for(let i=0;i<N;i++) points.push({x:randInt(20,W-20)+Math.random()*2-1, y:randInt(20,H-20)+Math.random()*2-1, cluster:-1});
}
function assignClusters(){
  for(let p of points){
    let best=0,bd=Infinity;
    for(let i=0;i<K;i++){let d=dist2(p,centroids[i]);if(d<bd){bd=d;best=i;}}
    p.cluster=best;
  }
}
function updateCentroids(){
  let sums=Array.from({length:K},()=>({x:0,y:0,n:0}));
  for(let p of points){ sums[p.cluster].x+=p.x; sums[p.cluster].y+=p.y; sums[p.cluster].n++; }
  for(let i=0;i<K;i++) if(sums[i].n>0){ centroids[i].x=sums[i].x/sums[i].n; centroids[i].y=sums[i].y/sums[i].n; }
  stepCount++;
  document.getElementById('stepcount').textContent='#'+stepCount;
}

function drawVoronoi(){
  const img=ctx.createImageData(W,H);
  for(let y=0;y<H;y++) for(let x=0;x<W;x++){
    let best=0,bd=Infinity;
    for(let i=0;i<K;i++){let d=(x-centroids[i].x)**2+(y-centroids[i].y)**2;if(d<bd){bd=d;best=i;}}
    const col=hexToRgb(PALETTE[best%PALETTE.length].fill);
    const idx=(y*W+x)*4;
    img.data[idx]=col.r+30; img.data[idx+1]=col.g+30; img.data[idx+2]=col.b+45; img.data[idx+3]=255;
  }
  ctx.putImageData(img,0,0);
}

function drawBorderLines(){
  const step=3;
  for(let y=0;y<H;y+=step) for(let x=0;x<W;x+=step){
    let c0=-1,border=false;
    const check=[[x,y],[x+step,y],[x,y+step],[x+step,y+step]];
    for(const[cx,cy] of check){
      let best=0,bd=Infinity;
      for(let i=0;i<K;i++){let d=(cx-centroids[i].x)**2+(cy-centroids[i].y)**2;if(d<bd){bd=d;best=i;}}
      if(c0===-1) c0=best;
      else if(best!==c0){border=true;break;}
    }
    if(border){
      ctx.beginPath();
      ctx.arc(x+step/2,y+step/2,1,0,2*Math.PI);
      ctx.fillStyle='rgba(255,255,255,0.18)';
      ctx.fill();
    }
  }
}

function drawPoints(){
  for(let p of points){
    const col=PALETTE[p.cluster>=0?p.cluster%PALETTE.length:0];
    ctx.beginPath();ctx.arc(p.x,p.y,4,0,2*Math.PI);
    ctx.fillStyle=p.cluster>=0?col.light:'#888';
    ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.4)';ctx.lineWidth=0.8;ctx.stroke();
  }
}

function drawCentroids(){
  for(let i=0;i<K;i++){
    const col=PALETTE[i%PALETTE.length];
    ctx.beginPath();ctx.arc(centroids[i].x,centroids[i].y,14,0,2*Math.PI);
    ctx.fillStyle='rgba(15,15,19,0.85)';ctx.fill();
    ctx.strokeStyle=col.border;ctx.lineWidth=2.5;ctx.stroke();
    ctx.beginPath();ctx.arc(centroids[i].x,centroids[i].y,5,0,2*Math.PI);
    ctx.fillStyle=col.border;ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.85)';
    ctx.font='bold 11px Segoe UI, sans-serif';
    ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText('C'+(i+1),centroids[i].x,centroids[i].y+17);
  }
}

function updateLegend(){
  const leg=document.getElementById('legend');
  leg.innerHTML='';
  for(let i=0;i<K;i++){
    const cnt=points.filter(p=>p.cluster===i).length;
    const col=PALETTE[i%PALETTE.length];
    leg.innerHTML+=`<div class="leg-item"><div class="leg-dot" style="background:${col.border}"></div><span>C${i+1}: <b style="color:#c8c4f0">${cnt}</b> điểm</span></div>`;
  }
}

function render(){
  ctx.clearRect(0,0,W,H);
  drawVoronoi();
  drawBorderLines();
  drawPoints();
  drawCentroids();
  updateLegend();
}

function fullReset(){
  K=parseInt(document.getElementById('kslider').value);
  N=parseInt(document.getElementById('nslider').value);
  initCentroids(); initPoints(); assignClusters(); render();
}

document.getElementById('kslider').oninput=function(){
  document.getElementById('kval').textContent=this.value;
  K=parseInt(this.value); initCentroids(); assignClusters(); render();
};
document.getElementById('nslider').oninput=function(){
  document.getElementById('nval').textContent=this.value;
  N=parseInt(this.value); initPoints(); assignClusters(); render();
};
document.getElementById('btnRegen').onclick=fullReset;
document.getElementById('btnStep').onclick=function(){ updateCentroids(); assignClusters(); render(); };
document.getElementById('btnReset').onclick=function(){ initCentroids(); assignClusters(); render(); };

function getXY(e){
  const r=canvas.getBoundingClientRect();
  const scaleX=W/r.width, scaleY=H/r.height;
  const cl=e.touches?e.touches[0]:e;
  return {x:(cl.clientX-r.left)*scaleX, y:(cl.clientY-r.top)*scaleY};
}

canvas.addEventListener('mousedown',e=>{
  const {x,y}=getXY(e);
  for(let i=0;i<K;i++) if(dist2({x,y},centroids[i])<300){dragging=i;return;}
  points.push({x,y,cluster:-1}); N++; assignClusters(); render();
  document.getElementById('nval').textContent=N;
  document.getElementById('nslider').value=Math.min(N,300);
});
canvas.addEventListener('mousemove',e=>{
  if(dragging<0) return;
  const {x,y}=getXY(e);
  centroids[dragging]={x,y}; assignClusters(); render();
});
canvas.addEventListener('mouseup',()=>dragging=-1);
canvas.addEventListener('mouseleave',()=>dragging=-1);

fullReset();
</script>
</body>
</html>
